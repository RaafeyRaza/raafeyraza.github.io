<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects</title>

<style>
body{
  margin:0;
  background:#0b0f14;
  color:#e5e7eb;
  font-family: system-ui, -apple-system, sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

/* center wrapper properly */
.wrap{
  max-width:900px;
  margin:0 auto;
  padding:60px 20px;
  text-align:center;
}

/* better scaling title */
h1{
  font-size:clamp(28px, 5vw, 48px);
  margin-bottom:10px;
}

h3{
  margin-bottom:40px;
  font-size:clamp(14px, 2.5vw, 18px);
  opacity:0.8;
}

/* responsive grid fix */
.grid{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap:16px;
}

/* card fix (important: stop flex conflicts with animation) */
.card{
  padding:20px;
  border-radius:12px;
  background: rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.05);
  cursor:pointer;
  position:relative;
  overflow:hidden;

  display:flex;
  align-items:center;
  justify-content:center;

  animation: float 4s ease-in-out infinite alternate;
}

/* mobile tweak */
@media (max-width:600px){
  .wrap{
    padding:40px 12px;
  }

  .grid{
    grid-template-columns: repeat(2, 1fr);
  }
}
</style>
</head>

<body>

<div class="wrap">
  <h1>Projects</h1>
  <h3>Some cool things I have worked on</h3>

  <div class="grid">
    <div class="card"><span>option 1</span></div>
    <div class="card"><span>option 2</span></div>
    <div class="card"><span>option 3</span></div>
    <div class="card"><span>option 4</span></div>
    <div class="card"><span>option 5</span></div>
    <div class="card"><span>option 6</span></div>
  </div>

  <a href="/">go back</a>
</div>

<script>
// click ripple effect (tiny but satisfying)
document.querySelectorAll(".card").forEach(card=>{
  card.addEventListener("click", e=>{
    const ripple = document.createElement("div");
    ripple.style.position="absolute";
    ripple.style.width="10px";
    ripple.style.height="10px";
    ripple.style.background="rgba(77,163,255,0.4)";
    ripple.style.borderRadius="50%";
    ripple.style.left = e.offsetX + "px";
    ripple.style.top = e.offsetY + "px";
    ripple.style.transform="scale(0)";
    ripple.style.transition="0.5s";
    
    card.appendChild(ripple);

    setTimeout(()=> ripple.style.transform="scale(15)", 10);
    setTimeout(()=> ripple.remove(), 500);
  });
});
</script>

</body>
</html>
