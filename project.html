<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects</title>

<style>
body{
  margin:0;
  background:#0b0f14;
  color:#e5e7eb;
  font-family: system-ui, -apple-system, sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

/* background glow */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 30% 30%, rgba(77,163,255,0.08), transparent 40%),
    radial-gradient(circle at 70% 70%, rgba(74,222,128,0.06), transparent 45%);
  pointer-events:none;
}

/* wrapper */
.wrap{
  max-width:1100px;
  margin:0 auto;
  padding:60px 20px;
  text-align:center;
}

h1{
  font-size:clamp(28px, 5vw, 48px);
  margin-bottom:10px;
  letter-spacing:-1px;
}

h3{
  margin-bottom:40px;
  font-size:clamp(14px, 2.5vw, 18px);
  opacity:0.8;
}

/* FLEX LAYOUT */
.grid{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
  align-items:stretch;
}

/* PROJECT CARDS */
.card{
  flex: 1 1 260px;
  max-width: 320px;
  min-width: 220px;
  height: 180px;

  border-radius:14px;
  background: rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.06);

  cursor:pointer;
  position:relative;
  overflow:hidden;

  display:flex;
  align-items:center;
  justify-content:center;

  transition:0.3s ease;
  background-size: cover;
  background-position: center;
}
/* faded overlay */
.card::before{
  content:"";
  position:absolute;
  inset:0;
  background: rgba(0,0,0,0.55);
  z-index:1;
  transition: background 0.3s ease;
}
.card span{
  position:relative;
  z-index:2;
}
/* hover effect */
.card:hover{
  transform: translateY(-6px) scale(1.02);
  border-color: rgba(77,163,255,0.4);
  box-shadow: 0 10px 30px rgba(77,163,255,0.12);
}
.card:hover::before{
  background: transparent;
}
a.card{
  text-decoration:none;
  color:inherit;
}
/* underline animation */
.card::after{
  content:"";
  position:absolute;
  bottom:0;
  left:0;
  width:0%;
  height:2px;
  background:#4da3ff;
  transition:0.3s;
}

.card:hover::after{
  width:100%;
}

/* text inside card */
.card span{
  position:relative;
  z-index:2;
  font-size:16px;
  font-weight:500;
}

/* ripple */
.card-ripple{
  position:absolute;
  width:10px;
  height:10px;
  background:rgba(77,163,255,0.4);
  border-radius:50%;
  transform:scale(0);
  transition:0.5s;
  pointer-events:none;
}

/* mobile */
@media (max-width:700px){
  .card{
    flex: 1 1 100%;
    max-width:100%;
    height:160px;
  }
}

/* back link */
a{
  display:inline-block;
  margin-top:30px;
  color:#4da3ff;
  text-decoration:none;
  position:relative;
}

a::after{
  content:"";
  position:absolute;
  left:0;
  bottom:-3px;
  width:0%;
  height:1px;
  background:#4da3ff;
  transition:0.3s;
}

a:hover::after{
  width:100%;
}

.cursor-dot{
  position:fixed;
  width:6px;
  height:6px;
  background:#4da3ff;
  border-radius:50%;
  pointer-events:none;
  z-index:9999;
  box-shadow:0 0 8px #4da3ff, 0 0 16px #4da3ff;
  opacity:0.8;
  transform:translate(-50%, -50%);
}
</style>
</head>

<body>

<div class="wrap">
  <h1>Projects</h1>
  <h3>Some cool things I have worked on</h3>

<div class="grid">
  <a href="cloth" class="card" style="background-image:url('/img/cloth.png')">
    <span>Cloth</span>
  </a>

  <a href="spider" class="card" style="background-image:url('/img/spider.png')">
    <span>Spider</span>
  </a>

  <a href="eel" class="card" style="background-image:url('/img/eel.png')">
    <span>Water Eel</span>
  </a>

  <a href="/heart" class="card" style="background-image:url('/img/heart.png')">
    <span>Heart</span>
  </a>

  <a href="/fluid" class="card" style="background-image:url('/img/fluid.png')">
    <span>Fluid</span>
  </a>

  <a href="/smoothfluid" class="card" style="background-image:url('/img/smoothfluid.png')">
    <span>Smooth Fluid</span>
  </a>
</div>

  <a href="/">go back</a>
</div>


<script>
document.querySelectorAll(".card").forEach(card=>{
  card.addEventListener("click", e=>{
    const ripple = document.createElement("div");
    ripple.className = "card-ripple";

    ripple.style.left = e.offsetX + "px";
    ripple.style.top = e.offsetY + "px";

    card.appendChild(ripple);

    setTimeout(()=> ripple.style.transform="scale(15)", 10);
    setTimeout(()=> ripple.remove(), 1000);
  });
});
</script>

<!-- ========================= -->
<!-- CURSOR TRAIL SCRIPT -->
<!-- ========================= -->

<script>
const isTouch = matchMedia("(pointer: coarse)").matches || "ontouchstart" in window;

if (!isTouch) {
  const dots = [];
  const maxDots = 12;

  for (let i = 0; i < maxDots; i++) {
    const d = document.createElement("div");
    d.className = "cursor-dot";
    document.body.appendChild(d);
    dots.push({ el: d, x: 0, y: 0 });
  }

  let mouse = { x: 0, y: 0 };

  window.addEventListener("mousemove", e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
  });

  function animate() {
    let x = mouse.x;
    let y = mouse.y;

    dots.forEach((dot, i) => {
      dot.x += (x - dot.x) * 0.3;
      dot.y += (y - dot.y) * 0.3;

      dot.el.style.left = dot.x + "px";
      dot.el.style.top = dot.y + "px";

      x = dot.x;
      y = dot.y;

      dot.el.style.transform = `translate(-50%, -50%) scale(${1 - i * 0.05})`;
      dot.el.style.opacity = 1 - i * 0.08;
    });

    requestAnimationFrame(animate);
  }

  animate();
}
</script>

</body>
</html>
