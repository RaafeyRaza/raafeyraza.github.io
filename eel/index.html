<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eel</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000000; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/simplex-noise/2.4.0/simplex-noise.min.js"></script>

<script>
const hueBase = 60
const hueRange = 160
const segmentCount = 70
const bubbleCount = 500
const segmentLengthBase = 5

let buffer, canvas, creature, bubbles, center, simplex

function fadeIn(t, m) { return t / m }
function fadeOut(t, m) { return (m - t) / m }
function fadeInOut(t, m) {
  let hm = 0.5 * m
  return Math.abs((t + hm) % m - hm) / hm
}
function calcAngle(x1, y1, x2, y2) { return Math.atan2(y2 - y1, x2 - x1) }

class AttributeArray {
  constructor(count, attrs) {
    this.count = count
    this.attrs = attrs
    this.spread = attrs.length
    this.values = new Float32Array(count * this.spread)
  }
  get length() { return this.values.length }
  set(a, i) { this.values.set(a, i) }
  get(i) { return this.values.slice(i, i + this.spread) }
  forEach(cb) {
    for (let i = 0, j = 0; i < this.length; i += this.spread, j++) {
      cb(this.get(i), j, this)
    }
  }
  map(cb) {
    for (let i = 0, j = 0; i < this.length; i += this.spread, j++) {
      this.set(cb(this.get(i), j, this), i)
    }
  }
  reverseMap(cb) {
    for (let i = this.length - this.spread, j = this.count - 1; i >= 0; i -= this.spread, j--) {
      this.set(cb(this.get(i), j, this), i)
    }
  }
}

class Bubbles extends AttributeArray {
  constructor(count) {
    super(count, ['x','y','vx','vy','s','d','h','l','ttl'])
    this.repelTarget = null
    this.repelThreshold = 100
    this.initPoints()
  }
  setRepelTarget(target) { this.repelTarget = target }
  initPoints() {
    this.map(() => [
      random(-0.25 * width, width * 1.25),
      random(height * 1.25),
      random(-2, 2),
      random(-4, -1),
      random(2, 6),
      random(2, 6),
      random(180, 240),
      random(0, 200),
      random(500, 1000)
    ])
  }
  reset() {
    return [
      random(-0.25 * width, width * 1.25),
      random(height * 1.25),
      0,
      random(-4, -1),
      random(2, 6),
      random(2, 6),
      random(180, 240),
      0,
      random(500, 1000)
    ]
  }
  drawParticle(x, y, d, h, l, ttl) {
    const ld = fadeInOut(l, ttl)
    buffer.stroke(h, 50, 100, 0.5 * ld)
    buffer.strokeWeight(1 + d * ld)
    buffer.point(x, y)
  }
  update() {
    this.map(([x, y, vx, vy, s, d, h, l, ttl]) => {
      const n = simplex.noise3D(x * 0.0015, y * 0.0015, frameCount * 0.0015) * TWO_PI
      vx = lerp(vx, cos(n) * s, 0.15)
      vy = lerp(vy, (sin(n) + 2) * -s, 0.15)
      if (this.repelTarget && dist(x, y, this.repelTarget[0], this.repelTarget[1]) < this.repelThreshold) {
        const theta = calcAngle(x, y, this.repelTarget[0], this.repelTarget[1])
        vx = lerp(vx, vx - cos(theta) * s, 0.275)
        vy = lerp(vy, vy - sin(theta) * s, 0.275)
      }
      x = lerp(x, x + vx, 0.125)
      y = lerp(y, y + vy, 0.125)
      l++
      this.drawParticle(x, y, d, h, l, ttl)
      if (l > ttl || x > width + d || x < -d || y < -d) return this.reset()
      return [x, y, vx, vy, s, d, h, l, ttl]
    })
  }
}

class Chain extends AttributeArray {
  constructor(x, y, segmentNum, baseLength, baseDirection, additionalAttrs = []) {
    super(segmentNum, ['x1','y1','x2','y2','l','d', ...additionalAttrs])
    this.position = [x, y]
    this.target = [x, y]
    this.baseLength = baseLength
    this.baseDirection = baseDirection
  }
  get segmentNum() { return this.count }
  setTarget(arg) { this.target = typeof arg === 'function' ? arg(this.target) : arg }
  setPosition(arg) { this.position = typeof arg === 'function' ? arg(this.position) : arg }
  mapSegments(cb, direction = 'forward') {
    direction === 'backward' ? this.reverseMap(cb) : this.map(cb)
  }
  updateSegments(cb, direction = 'forward') {
    let target = this.position
    this.mapSegments(([x1, y1, x2, y2, l, d, ..._rest], i) => {
      x1 = target[0]; y1 = target[1]
      const [t, ...rest] = cb([x1, y1, x2, y2, l, d, ..._rest], i)
      const _d = isNaN(t) ? d : t
      x2 = x1 + l * cos(_d)
      y2 = y1 + l * sin(_d)
      target = [x2, y2]
      return [x1, y1, x2, y2, l, _d, ...rest]
    }, direction)
  }
}

class Creature extends Chain {
  constructor() {
    super(center[0], center[1], segmentCount, segmentLengthBase, 0, ['h'])
    this.follow = false
    this.initSegments()
  }
  initSegments() {
    let x1, y1, x2, y2, l, d, h
    l = this.baseLength; d = this.baseDirection
    this.mapSegments((_, i) => {
      x1 = x2 || this.position[0]; y1 = y2 || this.position[1]
      x2 = x1 - l * cos(d); y2 = y1 - l * sin(d)
      d += 0.1; l *= 1.01
      h = hueBase + fadeOut(i, this.segmentNum) * hueRange
      return [x1, y1, x2, y2, l, d, h]
    })
  }
  updateTarget() {
    if (!this.follow) {
      const t = simplex.noise3D(
        this.target[0] * 0.005, this.target[1] * 0.005, frameCount * 0.005
      ) * TWO_PI
      this.setTarget([
        lerp(this.target[0], this.target[0] + 20 * (cos(t) + cos(frameCount * 0.05)), 0.25),
        lerp(this.target[1], this.target[1] + 20 * (sin(t) + sin(frameCount * 0.05)), 0.25)
      ])
    }
    if (
      this.position[0] > width + 500 || this.position[0] < -500 ||
      this.position[1] > height + 500 || this.position[1] < -500
    ) {
      this.setTarget([...center])
    }
  }
  update() {
    this.setPosition([
      lerp(this.position[0], this.target[0], 0.015),
      lerp(this.position[1], this.target[1], 0.015)
    ])
    this.updateTarget()
    this.updateSegments(([x1, y1, x2, y2, l, d, h], i) => {
      const n = simplex.noise3D(x1 * 0.005, y1 * 0.005, (i + frameCount) * 0.005)
      d = calcAngle(x1, y1, x2, y2) + (n * 0.075)
      this.drawSegment(x1, y1, x2, y2, h, n, d, i)
      return [d]
    }, 'backward')
  }
  drawSegment(x1, y1, x2, y2, h, n, tn, i) {
    const arcWidth = 6 + 30 * fadeIn(i, this.segmentNum)
    const lineLength = 1.35 * arcWidth
    const lineLeftX = x1 + lineLength * cos(tn + 0.85 + n)
    const lineLeftY = y1 + lineLength * sin(tn + 0.85 + n)
    const lineRightX = x1 + lineLength * cos(tn - 0.85 - n)
    const lineRightY = y1 + lineLength * sin(tn - 0.85 - n)
    const nubWidth = arcWidth * 0.35
    buffer.strokeWeight(1 + fadeIn(i, this.segmentNum) * 4)
    buffer.stroke(h, 100, 100, 0.1)
    buffer.noFill()
    buffer.line(x1, y1, lineLeftX, lineLeftY)
    buffer.ellipse(lineLeftX, lineLeftY, nubWidth)
    buffer.line(x1, y1, lineRightX, lineRightY)
    buffer.ellipse(lineRightX, lineRightY, nubWidth)
    buffer.line(x2, y2, x1, y1)
    buffer.ellipse(x1, y1, arcWidth)
  }
}

function setup() {
  buffer = createGraphics(windowWidth, windowHeight)
  buffer.colorMode(HSB)
  canvas = createCanvas(windowWidth, windowHeight)
  canvas.mouseOver(() => { creature.follow = true })
  canvas.mouseOut(() => { creature.follow = false })
  frameRate(60)
  simplex = new SimplexNoise()
  center = [0.5 * windowWidth, 0.5 * windowHeight]
  creature = new Creature()
  bubbles = new Bubbles(bubbleCount)
}

function drawGlow() {
  drawingContext.save()
  drawingContext.filter = 'blur(6px) brightness(200%)'
  image(buffer, 0, 0)
  drawingContext.restore()
}

function drawImage() {
  drawingContext.save()
  drawingContext.globalCompositeOperation = 'lighter'
  image(buffer, 0, 0)
  drawingContext.restore()
}

function draw() {
  buffer.background(0, 0, 0)
  try {
    creature.update()
    bubbles.setRepelTarget(creature.position)
    bubbles.update()
    drawGlow()
    drawImage()
  } catch(e) {
    console.error(e)
    noLoop()
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight)
  buffer.resizeCanvas(windowWidth, windowHeight)
  center = [0.5 * windowWidth, 0.5 * windowHeight]
}

function mouseMoved() {
  creature.setTarget([mouseX, mouseY])
}
</script>
</body>
</html>
